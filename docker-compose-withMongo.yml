services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rest-api:local
    container_name: rest-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      # Connessione al servizio "mongo" definito sotto (nome risolto dalla rete Docker interna).
      MONGO_CNN: "mongodb://mongo:27017"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: rest-api-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
